[auth]
site_url = "https://zenvi.pro"
additional_redirect_urls = ["https://zenvi.pro/auth/callback", "https://zenvi.pro", "http://localhost:5173/auth/callback", "http://localhost:5173"]

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[auth.external.github]
enabled = true
client_id = "env(SUPABASE_AUTH_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GITHUB_SECRET)"

[auth.email.template.confirmation]
subject = "Confirm your Zenvi account"
content_path = "./supabase/templates/confirm.html"

[auth.email.template.recovery]
subject = "Reset your Zenvi password"
content_path = "./supabase/templates/recovery.html"

[functions.create-checkout-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.send-welcome-email]
verify_jwt = false

[functions.claude-generate]
verify_jwt = true