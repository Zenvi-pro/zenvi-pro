<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your Zenvi account</title>
</head>
<body style="margin:0;padding:0;background-color:#0A0A0A;font-family:Inter,system-ui,-apple-system,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0A0A0A;">
    <tr>
      <td align="center" style="padding:48px 24px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;text-decoration:none;">Zenvi</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#111111;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:40px 40px 36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Icon -->
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <table cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="width:48px;height:48px;background-color:rgba(0,102,255,0.08);border:1px solid rgba(0,102,255,0.22);border-radius:10px;text-align:center;vertical-align:middle;">
                          <span style="font-size:22px;line-height:48px;">✉</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <!-- Heading -->
                <tr>
                  <td align="center" style="padding-bottom:10px;">
                    <span style="font-size:20px;font-weight:600;color:#ffffff;display:block;">Confirm your email</span>
                  </td>
                </tr>

                <!-- Body -->
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <span style="font-size:14px;color:#888888;line-height:1.65;display:block;max-width:340px;margin:0 auto;">
                      You're one step away. Click the button below to confirm your email address and activate your Zenvi account.
                    </span>
                  </td>
                </tr>

                <!-- CTA Button -->
                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#0066FF;color:#ffffff;text-decoration:none;font-size:14px;font-weight:500;padding:13px 36px;border-radius:8px;letter-spacing:0.1px;">
                      Confirm email address
                    </a>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="border-top:1px solid rgba(255,255,255,0.06);padding-top:24px;">
                    <p style="font-size:12px;color:#555555;text-align:center;margin:0;line-height:1.7;">
                      If you didn't create a Zenvi account, you can safely ignore this email.<br/>
                      This link expires in 24 hours.
                    </p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:28px;">
              <p style="font-size:12px;color:#3a3a3a;margin:0;">
                © 2025 Zenvi &nbsp;·&nbsp;
                <a href="{{ .SiteURL }}" style="color:#3a3a3a;text-decoration:none;">zenvi.pro</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
